<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart Disease Prediction - Dashboard</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url("https://dvl2h13awlxkt.cloudfront.net/assets/general-images/Knowledge/_1200x630_crop_center-center_82_none/CVD-iStock-1266230179.jpg?mtime=1653282867") no-repeat center center fixed;
      background-size: cover;
      color: #333;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(211, 47, 47, 0.95);
      padding: 15px 40px;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
    }

    .navbar h1 {
      color: white;
      font-size: 22px;
      margin: 0;
    }

    .nav-links {
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      text-decoration: none;
      color: white;
      padding: 10px 18px;
      background: #f44336;
      border-radius: 8px;
      transition: 0.3s;
      font-weight: bold;
    }

    .nav-links a:hover {
      background: #b71c1c;
    }

    /* Dashboard Content */
    .dashboard {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      height: 85vh;
      text-align: center;
    }

    .stats-card {
      background: rgba(255, 255, 255, 0.92);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.3);
      width: 450px;
      animation: fadeIn 1s ease-in-out;
    }

    .stats-card h2 {
      color: #d32f2f;
      margin-bottom: 15px;
      font-size: 24px;
    }

    .stats-card p {
      font-size: 18px;
      font-weight: bold;
      color: #444;
    }

    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <div class="navbar">
    <h1>Full stack project</h1>
    <div class="nav-links">
      <a href="{{ url_for('about') }}">About</a>
    </div>
  </div>

  <!-- Dashboard Content -->
  <div class="dashboard">
    <div class="stats-card">
      <h2>Full stack project</h2>
      <p>💔 Every year, <span style="color:#d32f2f;">17.9 million people</span> die due to cardiovascular diseases worldwide (WHO report).</p>
    </div>
  </div>
</body>
</html>
