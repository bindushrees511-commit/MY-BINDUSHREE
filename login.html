<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hepatitis C Prediction - Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url("https://medlineplus.gov/images/HepatitisC_share.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.92);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.3);
            width: 350px;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 25px;
            color: #b70a0a; /* greenish color for liver/hepatitis */
        }

        .login-box input[type="email"],
        .login-box input[type="password"] {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        .login-box input[type="submit"] {
            width: 95%;
            padding: 12px;
            background-color: #b70a0a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        .login-box input[type="submit"]:hover {
            background-color: #2e7d32;
        }

        .login-box a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #1565c0;
            font-weight: bold;
            transition: 0.3s;
        }

        .login-box a:hover {
            color: #0d47a1;
        }
    </style>

    <script>
        function validateForm(event) {
            const email = document.forms["loginForm"]["email"].value;
            const password = document.forms["loginForm"]["password"].value;

            if (email.trim() === "" || password.trim() === "") {
                alert("Both fields are required!");
                event.preventDefault();
                return false;
            }

            const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
            if (!email.match(emailPattern)) {
                alert("Please enter a valid email address!");
                event.preventDefault();
                return false;
            }

            if (password.length < 6) {
                alert("Password must be at least 6 characters long!");
                event.preventDefault();
                return false;
            }

            return true;
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h2>Full stack project</h2>
            <form name="loginForm" method="post" onsubmit="return validateForm(event)">
                <input type="email" name="email" placeholder="Email" required><br>
                <input type="password" name="password" placeholder="Password" required><br>
                <input type="submit" value="Login">
            </form>
            <a href="{{ url_for('signup') }}">Don't have an account? Sign up</a>
        </div>
    </div>
</body>
</html>
