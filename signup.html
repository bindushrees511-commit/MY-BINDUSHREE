<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hepatitis C Prediction - Signup</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url("https://medlineplus.gov/images/HepatitisC_share.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .signup-box {
            background: rgba(255, 255, 255, 0.92);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.3);
            width: 380px;
            text-align: center;
        }

        .signup-box h2 {
            margin-bottom: 25px;
            color: #b70a0a; /* greenish for liver/hepatitis theme */
        }

        .signup-box input[type="text"],
        .signup-box input[type="email"],
        .signup-box input[type="password"] {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        .signup-box input[type="submit"] {
            width: 95%;
            padding: 12px;
            background-color: #b70a0a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        .signup-box input[type="submit"]:hover {
            background-color: #2e7d32;
        }

        .signup-box a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #1565c0;
            font-weight: bold;
            transition: 0.3s;
        }

        .signup-box a:hover {
            color: #0d47a1;
        }
    </style>

    <script>
        function validateSignupForm(event) {
            const form = document.forms["signupForm"];
            const name = form["name"].value.trim();
            const email = form["email"].value.trim();
            const password = form["password"].value;
            const confirmPassword = form["confirm_password"].value;

            if (name === "" || email === "" || password === "" || confirmPassword === "") {
                alert("All fields are required!");
                event.preventDefault();
                return false;
            }

            const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
            if (!email.match(emailPattern)) {
                alert("Please enter a valid email address!");
                event.preventDefault();
                return false;
            }

            if (password.length < 6) {
                alert("Password must be at least 6 characters long!");
                event.preventDefault();
                return false;
            }

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                event.preventDefault();
                return false;
            }

            return true;
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="signup-box">
            <h2>Create Your Account</h2>
            <form name="signupForm" method="post" onsubmit="return validateSignupForm(event)">
                <input type="text" name="name" placeholder="Full Name" required><br>
                <input type="email" name="email" placeholder="Email" required><br>
                <input type="password" name="password" placeholder="Password" required><br>
                <input type="password" name="confirm_password" placeholder="Confirm Password" required><br>
                <input type="submit" value="Signup">
            </form>
            <a href="{{ url_for('login') }}">Already have an account? Login</a>
        </div>
    </div>
</body>
</html>
